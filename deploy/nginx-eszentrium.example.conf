# Reverse proxy: allow large lobby image uploads
#
# 413 on POST /api/images usually means nginx (default client_max_body_size is 1m)
# blocks the request BEFORE it reaches NestJS.
#
# Add inside your server { } block for eszentrium.wt-my-vps.eu, then reload nginx:
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl;
    server_name eszentrium.wt-my-vps.eu;

    # Required for map images (client compresses to ~10MB; allow headroom)
    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
