# Reverse proxy for eszentrium.wt-my-vps.eu
#
# 413 on POST /api/images/upload with a ~10 MB file means nginx is NOT using 100m —
# the default is 1m. The directive must be in the active server/location block, then reload.
#
# Verify on the VPS:
#   sudo nginx -T 2>/dev/null | grep client_max_body_size
#   curl -s https://eszentrium.wt-my-vps.eu/api/health/upload-limits
#
# Test bypassing nginx (from the VPS itself):
#   curl -F "file=@/path/to/hex_0_0.png" http://127.0.0.1:3000/api/images/upload

server {
    listen 443 ssl;
    server_name eszentrium.wt-my-vps.eu;

    # Must apply to API uploads (inheritance sometimes fails if only set in http {})
    client_max_body_size 100m;

    location /api/ {
        client_max_body_size 100m;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
