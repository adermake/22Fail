# Reverse proxy: allow large image uploads (lobby + world-map macro tiles)
#
# 413 on POST /api/images/upload means nginx (default client_max_body_size is 1m)
# blocks the request BEFORE it reaches NestJS.
#
# World-map hex tiles are ~3128×3620 PNG and can be 20–150 MB each.
#
# Add inside your server { } block for eszentrium.wt-my-vps.eu, then reload nginx:
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl;
    server_name eszentrium.wt-my-vps.eu;

    # Required for world-map macro tiles and large lobby assets
    client_max_body_size 500m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
    }
}
