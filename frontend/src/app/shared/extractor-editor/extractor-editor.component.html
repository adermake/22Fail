<div class="ext-editor">
  <div class="ee-top-row">
    <div class="ee-field ee-name-field">
      <label>Name</label>
      <input type="text" [(ngModel)]="edit.name" placeholder="Extraktorname" />
    </div>
    <div class="ee-field">
      <label>Rarit&#xE4;t</label>
      <select [(ngModel)]="edit.rarity">
        <option value="COMMON">Gew&#xF6;hnlich</option>
        <option value="RARE">Selten</option>
        <option value="LEGENDARY">Legend&#xE4;r</option>
      </select>
    </div>
    <div class="ee-field">
      <label>Kosten</label>
      <input type="number" [(ngModel)]="edit.cost" min="0" />
    </div>
    <label class="ee-toggle"><input type="checkbox" [(ngModel)]="edit.isPublic" /> &#xD6;ffentlich</label>
  </div>

  <textarea class="ee-desc" [(ngModel)]="edit.description" rows="2" placeholder="Beschreibung..."></textarea>

  <div class="ee-reduce-block">
    <div class="ee-ttl">Kostensenkung (%)</div>
    <p class="ee-hint">Reduziert Braukosten f&#xFC;r den jeweiligen Slot. Mehrere Extraktoren werden addiert (max. 95%).</p>
    <div class="ee-reduce-grid">
      <label>Prim&#xE4;r</label>
      <input type="number" [(ngModel)]="edit.primaryReductionPercent" min="0" max="100" />
      <label>Sekund&#xE4;r</label>
      <input type="number" [(ngModel)]="edit.secondaryReductionPercent" min="0" max="100" />
      <label>Terti&#xE4;r</label>
      <input type="number" [(ngModel)]="edit.tertiaryReductionPercent" min="0" max="100" />
    </div>
  </div>

  <div class="ee-actions">
    <button class="ee-cancel" type="button" (click)="cancel.emit()">Abbrechen</button>
    <button class="ee-save" type="button" (click)="onSave()" [disabled]="!edit.name?.trim()">Speichern</button>
  </div>
</div>
