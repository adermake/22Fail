<div class="character-tabs-container">
  <div class="tabs-header">
    <button
      class="tab-button"
      [class.active]="activeTab === 'inventory'"
      (click)="setActiveTab('inventory')">
      Inventar ({{ (sheet.inventory || []).length }})
    </button>
    <button
      class="tab-button"
      [class.active]="activeTab === 'wissen'"
      (click)="setActiveTab('wissen')">
      Wissen
    </button>
    <button
      class="trash-button"
      (click)="openTrash.emit()"
      title="Open Trash"
      [attr.data-count]="(sheet.trash || []).length">
      🗑️
    </button>
  </div>

  <div class="tab-content">
    <!-- Inventory Tab - Always rendered but hidden when not active for CDK drag-drop -->
    <div [style.display]="activeTab === 'inventory' ? 'block' : 'none'">
      <app-inventory
        [sheet]="sheet"
        (patch)="onPatch($event)"
        (rollWeaponDamage)="rollWeaponDamage.emit($event)"
        (openForge)="openForgingOverlay()">
      </app-inventory>
    </div>

    <!-- Wissen Tab (Runen + Bekannte Materialien) -->
    @if (activeTab === 'wissen') {
      <app-wissen
        [sheet]="sheet"
        (patch)="onPatch($event)">
      </app-wissen>
    }

    <!-- Status Effects Tab -->
  </div>
</div>

<!-- Forging Overlay -->
@if (showForgingOverlay) {
  <div class="forging-overlay-backdrop" (click)="closeForgingOverlay()">
    <div class="forging-overlay-panel" (click)="$event.stopPropagation()">
      <div class="forging-overlay-header">
        <span class="forging-overlay-title">⚒ Schmiede</span>
        <button class="forging-overlay-close" (click)="closeForgingOverlay()">✕</button>
      </div>
      <div class="forging-overlay-body">
        <app-forging [sheet]="sheet" (patch)="onPatch($event)" (closeOverlay)="closeForgingOverlay()"></app-forging>
      </div>
    </div>
  </div>
}
