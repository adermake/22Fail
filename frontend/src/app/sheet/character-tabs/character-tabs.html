<div class="character-tabs-container">
  <div class="tabs-header">
    <button
      class="tab-button"
      [class.active]="activeTab === 'inventory'"
      (click)="setActiveTab('inventory')">
      Inventar ({{ (sheet.inventory || []).length }})
    </button>
    <button
      class="tab-button"
      [class.active]="activeTab === 'resources'"
      (click)="setActiveTab('resources')">
      Ressourcen ({{ (sheet.resources || []).length }})
    </button>
    <button
      class="tab-button"
      [class.active]="activeTab === 'spells'"
      (click)="setActiveTab('spells')">
      Zauber ({{ (sheet.spells || []).length }})
    </button>
    <button
      class="tab-button"
      [class.active]="activeTab === 'skills'"
      (click)="setActiveTab('skills')">
      Fähigkeiten ({{ (sheet.skills || []).length }})
    </button>
    <button
      class="tab-button"
      [class.active]="activeTab === 'wissen'"
      (click)="setActiveTab('wissen')">
      Wissen
    </button>
    <button
      class="trash-button"
      (click)="openTrash.emit()"
      title="Open Trash"
      [attr.data-count]="(sheet.trash || []).length">
      🗑️
    </button>
  </div>

  <div class="tab-content">
    <div [style.display]="activeTab === 'inventory' ? 'block' : 'none'">
      <app-inventory
        [sheet]="sheet"
        (patch)="onPatch($event)"
        (rollWeaponDamage)="rollWeaponDamage.emit($event)"
        (openForge)="openForgingOverlay()"
        (openBrew)="openBrewingOverlay()">
      </app-inventory>
    </div>

    @if (activeTab === 'resources') {
      <app-resources
        [sheet]="sheet"
        (patch)="onPatch($event)">
      </app-resources>
    }

    @if (activeTab === 'spells') {
      <app-spells
        [sheet]="sheet"
        [editingSpells]="editingSpells"
        (patch)="onPatch($event)"
        (editingChange)="onSpellEditingChange($event)"
        (requestCastWindow)="requestCastWindow.emit()">
      </app-spells>
    }

    @if (activeTab === 'skills') {
      <app-skills
        [sheet]="sheet"
        [editingSkills]="editingSkills"
        (patch)="onPatch($event)"
        (editingChange)="onSkillEditingChange($event)"
        (triggerMacro)="triggerMacro.emit($event)">
      </app-skills>
    }

    @if (activeTab === 'wissen') {
      <app-wissen
        [sheet]="sheet"
        (patch)="onPatch($event)">
      </app-wissen>
    }
  </div>
</div>

@if (showForgingOverlay) {
  <div class="forging-overlay-backdrop" (click)="closeForgingOverlay()">
    <div class="forging-overlay-panel" (click)="$event.stopPropagation()">
      <div class="forging-overlay-header">
        <span class="forging-overlay-title">⚒ Schmiede</span>
        <button class="forging-overlay-close" (click)="closeForgingOverlay()">✕</button>
      </div>
      <div class="forging-overlay-body">
        <app-forging [sheet]="sheet" (patch)="onPatch($event)" (closeOverlay)="closeForgingOverlay()"></app-forging>
      </div>
    </div>
  </div>
}

@if (showBrewingOverlay) {
  <div class="forging-overlay-backdrop" (click)="closeBrewingOverlay()">
    <div class="forging-overlay-panel" (click)="$event.stopPropagation()">
      <div class="forging-overlay-header">
        <span class="forging-overlay-title">🧪 Braukessel</span>
        <button class="forging-overlay-close" (click)="closeBrewingOverlay()">✕</button>
      </div>
      <div class="forging-overlay-body">
        <app-brewing [sheet]="sheet" (patch)="onPatch($event)" (closeOverlay)="closeBrewingOverlay()"></app-brewing>
      </div>
    </div>
  </div>
}
