<div class="events-view-container">
  @if (events.length === 0) {
    <div class="no-events">
      <span class="no-events-icon">📜</span>
      <p>Keine aktuellen Ereignisse</p>
      <p class="hint">Der Spielleiter kann Shops und Loot-Bündel aktivieren</p>
    </div>
  }

  @for (event of events; track event.id) {
    <div class="event-card-portal" 
         [class.shop]="event.type === 'shop'" 
         [class.loot]="event.type === 'loot'"
         (click)="openPortal(event.id)">
      <div class="portal-icon-large">{{ event.type === 'shop' ? '🏪' : '💰' }}</div>
      <h3 class="portal-event-name">{{ event.name }}</h3>
      @if (event.description) {
        <p class="portal-event-description">{{ event.description }}</p>
      }
      <button class="enter-portal-btn" (click)="openPortal(event.id); $event.stopPropagation()">
        <span>🌀</span>
        <span>Portal betreten</span>
      </button>
    </div>
  }
</div>
