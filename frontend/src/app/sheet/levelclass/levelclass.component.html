<div class="character">
  <app-card>
    <h2>Klassen</h2>

    <div class="row">
      <div class="col">
        <label for="primary">Primär</label>
        <input
          id="primary"
          type="text"
          placeholder="Kämpfer"
          [(ngModel)]="sheet.primary_class"
          (ngModelChange)="updateField('primary_class', $event)"
        />
      </div>
      <div class="col">
        <label for="secondary">Sekundär</label>
        <input
          id="secondary"
          type="text"
          placeholder="Techniker"
          [(ngModel)]="sheet.secondary_class"
          (ngModelChange)="updateField('secondary_class', $event)"
        />
      </div>
      <div class="col">
        <label for="level">Level</label>
        <input
          id="level"
          type="number"
          placeholder="1"
          [(ngModel)]="sheet.level"
          (ngModelChange)="updateField('level', $event)"
        />
      </div>
    </div>

    <!-- Fähigkeitspunkte Section -->
    <div class="talent-section">
      <div class="talent-header">
        <h3>Fähigkeitspunkte (FP)</h3>
        <button class="skill-tree-btn" (click)="onOpenSkillTree()">
          Fähigkeitenbaum öffnen
        </button>
      </div>

      <div class="talent-info" [class.has-points]="availableTalentPoints > 0">
        <span class="pts-ungenutzt" [class.pts-flash]="availableTalentPoints > 0">Ungenutzt {{ availableTalentPoints }}</span>
        <span class="pts-sep">|</span>
        <span class="pts-ausgegeben">Ausgegeben {{ spentTalentPoints }}</span>
        <span class="pts-sep">|</span>
        <span class="pts-gesamt">Gesamt {{ totalTalentPoints }}</span>
      </div>

      <div class="bonus-adjust">
        <span class="bonus-label">Bonus-Punkte (GM):</span>
        <div class="bonus-controls">
          <button class="adjust-btn" (click)="adjustBonusPoints(-1)">-</button>
          <span class="bonus-value">{{ sheet.talentPointsBonus || 0 }}</span>
          <button class="adjust-btn" (click)="adjustBonusPoints(1)">+</button>
        </div>
      </div>
    </div>
  </app-card>
</div>
