<app-card>
  <div class="spells-header">
    <h2>Zauber</h2>
    <button class="add-btn" (click)="openNodeEditor(null)">+ Neuer Zauber</button>
  </div>

  <div class="spells-list" cdkDropList (cdkDropListDropped)="onDrop($event)">
    @for (spell of (sheet.spells || []); track i; let i = $index) {
    <div cdkDrag [cdkDragDisabled]="isSpellEditing(i)" (cdkDragStarted)="onDragStarted($event)">
      <app-spell
        [spell]="spell"
        [sheet]="sheet"
        [index]="i"
        [isEditing]="isSpellEditing(i)"
        (patch)="updateSpell(i, $event)"
        (delete)="deleteSpell(i)"
        (editingChange)="onEditingChange(i, $event)"
        (openEditor)="openNodeEditor(i)"
      ></app-spell>
      <div
        class="drag-placeholder-wrapper"
        *cdkDragPlaceholder
        [style.height]="placeholderHeight"
        [style.width]="placeholderWidth"
      ></div>
    </div>
    } @if ((sheet.spells || []).length === 0) {
    <p class="empty-message">Noch keine Zauber. Klicke + um einen zu erstellen.</p>
    }
  </div>
</app-card>

<!-- Spell Node Editor (fullscreen) -->
@if (showNodeEditor) {
  <app-spell-node-editor
    [spell]="nodeEditorSpell"
    [availableRunes]="learnedRunes"
    (save)="saveFromNodeEditor($event)"
    (cancel)="closeNodeEditor()"
    (deleteSpell)="deleteSpell(nodeEditorSpellIndex!); closeNodeEditor()">
  </app-spell-node-editor>
}
