<div class="container" (click)="pressed()">
  <app-card>
    <div class="stat-title">{{ stat.name }}</div>

    <div class="statbox">
      <div class="column">
        <label class="text">Basis</label>
        <input type="number" min="1" max="99" [ngModel]="stat.base" (ngModelChange)="updateField('base',$event)"/>
      </div>

      <div class="column">
        <label class="text">Steigung</label>
        <input type="number" min="1" max="99" [ngModel]="stat.gain" (ngModelChange)="updateField('gain',$event)"/>
      </div>

      <div class="column">
        <label class="text">Frei</label>
        <div class="free-stat-control">
          <button class="free-stat-btn minus" (click)="decrementFreeStat(); $event.stopPropagation()" [disabled]="(stat.free || 0) === 0" title="Freien Stat Punkt entfernen">−</button>
          <div class="free-stat-value">{{ stat.free || 0 }}</div>
          <button class="free-stat-btn plus" (click)="incrementFreeStat(); $event.stopPropagation()" [disabled]="availableFreeStatPoints === 0" title="Freien Stat Punkt hinzufügen ({{ availableFreeStatPoints }} verfügbar)">+</button>
        </div>
      </div>

      <div class="column">
        <label class="text">Bonus</label>
        <input type="number" min="1" max="99" [ngModel]="stat.bonus" (ngModelChange)="updateField('bonus',$event)"/>
      </div>

      <div class="column">
        <label class="text effect-label" [title]="effectSources.join('\n')">Effekt</label>
        <div class="effect-value" [title]="effectSources.join('\n')">{{ effectBonus }}</div>
      </div>

      <div class="right-values">
        <div class="value">{{ total }}</div>
        @if (hasSpeedPenalty) {
          <div class="effective-speed" title="Geschwindigkeit nach Rüstung & Beladung">
            ➤ {{ effectiveSpeed }}
          </div>
        }
        <div class="value bonus" [ngClass]="bonusClass">{{ bonusValue }}</div>
      </div>
    </div>
  </app-card>
</div>
