<div class="stats">
  <app-card>
    <h2>Stats</h2>
    
    <!-- Free Stat Points Info -->
    <div class="free-stat-info" [class.has-points]="availableFreeStatPoints > 0">
      <div class="free-stat-row">
        <span class="label">Freie Stat Punkte:</span>
        <span class="value">
          <span class="available">{{ availableFreeStatPoints }}</span>
          <span class="total-info"> / {{ totalFreeStatPoints }} ({{ spentFreeStatPoints }} verwendet)</span>
        </span>
      </div>
      @if (trueStats.hasNaturtalent(sheet)) {
        <div class="talent-badge">🌟 Naturtalent: +1 Stat Punkt alle 2 Level</div>
      }
    </div>
    
    <!-- Spell Fokus Info -->
    <div class="fokus-info">
      <div class="fokus-display">
        <span class="fokus-label">Spell Fokus:</span>
        <span class="fokus-value">{{ fokusValue }}</span>
      </div>
      <div class="fokus-inputs">
        <div class="fokus-input-group">
          <label>Bonus (+)</label>
          <input
            type="number"
            step="1"
            [ngModel]="sheet.fokusBonus"
            (ngModelChange)="updateFokusSetting('fokusBonus', $event)"
          />
        </div>
        <div class="fokus-input-group">
          <label>Multiplikator (×)</label>
          <input
            type="number"
            step="0.1"
            min="0"
            [ngModel]="sheet.fokusMultiplier"
            (ngModelChange)="updateFokusSetting('fokusMultiplier', $event)"
          />
        </div>
      </div>
    </div>
    
    <div class="statgrid">
      <app-stat
        [stat]="sheet.strength"
        [sheet]="sheet"
        (patch)="updateField('strength',$event)"
      ></app-stat>
      <app-stat
        [stat]="sheet.constitution"
        [sheet]="sheet"
        (patch)="updateField('constitution',$event)"
      ></app-stat>
      <app-stat
        [stat]="sheet.speed"
        [sheet]="sheet"
        (patch)="updateField('speed',$event)"
      ></app-stat>
      <app-stat
        [stat]="sheet.dexterity"
        [sheet]="sheet"
        (patch)="updateField('dexterity',$event)"
      ></app-stat>
      <app-stat
        [stat]="sheet.intelligence"
        [sheet]="sheet"
        (patch)="updateField('intelligence',$event)"
      ></app-stat>
      <app-stat
        [stat]="sheet.chill"
        [sheet]="sheet"
        (patch)="updateField('chill',$event)"
      ></app-stat>
    </div>
    
    <div class="field">
      <label for="speedPenaltyNegation">Speed Penalty Negation</label>
      <input
        id="speedPenaltyNegation"
        type="number"
        placeholder="0"
        [ngModel]="sheet.speedPenaltyNegation"
        (ngModelChange)="patch.emit({ path: 'speedPenaltyNegation', value: $event })"
      />
    </div>
  </app-card>
</div>
