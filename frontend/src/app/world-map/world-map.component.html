<div class="world-map-page">
  <app-world-map-toolbar
    [currentTool]="currentTool()"
    [isGM]="isGM()"
    [isEraserMode]="isEraserMode()"
    [fogMode]="fogMode()"
    [brushColor]="brushColor()"
    [penBrushSize]="penBrushSize()"
    [worldName]="worldName()"
    [hasMacroTileSelected]="!!selectedMacroTileId()"
    (toolChange)="onToolChange($event)"
    (brushColorChange)="brushColor.set($event)"
    (penBrushSizeChange)="penBrushSize.set($event)"
    (clearDrawings)="clearDrawings()"
    (uploadTiles)="tileFileInput.click()"
    (removeMacroTile)="removeSelectedMacroTile()"
  />

  <input
    #tileFileInput
    type="file"
    accept="image/*"
    multiple
    hidden
    (change)="onTileFilesSelected($event)"
  />

  <div class="viewer-wrap" #viewerWrap>
    <div #viewerHost class="viewer-host"></div>
    <canvas #overlayCanvas class="overlay-canvas"></canvas>
    <canvas #fogCanvas class="fog-canvas"></canvas>

    <div class="token-layer">
      @for (token of visibleTokens(); track token.id) {
        <app-lobby-token
          [token]="token"
          [position]="getTokenScreenPosition(token)"
          [scale]="tokenScale()"
          [isSelected]="selectedTokenId() === token.id"
          [isInteractive]="currentTool() === 'cursor'"
          [isDragging]="draggingTokenId() === token.id"
          [isCurrentTurn]="false"
          [showResources]="false"
          (dragStart)="onTokenDragStart(token, $event)"
        />
      }
    </div>

    @if (showContextMenu()) {
      <div
        class="context-menu"
        [style.left.px]="contextMenuPos().x"
        [style.top.px]="contextMenuPos().y"
        (mousedown)="$event.stopPropagation()"
      >
        @if (contextMenuTokenId()) {
          <button type="button" (click)="removeContextToken()">🗑️ Token entfernen</button>
        } @else if (contextMenuHex() && isGM()) {
          <div class="quick-token-form">
            <input
              type="text"
              class="quick-token-name-input"
              [value]="quickTokenName()"
              (input)="quickTokenName.set($any($event.target).value)"
              placeholder="Token Name"
              (keydown.enter)="createQuickTokenFromMenu()"
            />
            <button type="button" (click)="createQuickTokenFromMenu()">➕ Erstellen</button>
          </div>
        }
      </div>
    }
  </div>
</div>
