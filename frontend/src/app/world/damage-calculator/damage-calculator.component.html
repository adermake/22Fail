<div class="dmg-calc-card">
  <div class="dmg-calc-header">
    <span class="dmg-calc-title">Schadensrechner</span>
    <span class="dmg-calc-formula">{{ formula }}</span>
  </div>

  <div class="dmg-calc-body">
    <!-- Effektivität + Stabilität inputs -->
    <div class="dmg-inputs-row">
      <div class="dmg-field">
        <label class="dmg-label">Effektivität (Würfelgröße)</label>
        <div class="dmg-effekt-row">
          <span class="dmg-dice-prefix">d</span>
          <input
            class="dmg-effekt-input"
            type="number"
            min="2"
            max="100"
            [(ngModel)]="effektivitaet"
          />
        </div>
      </div>

      <div class="dmg-field">
        <label class="dmg-label">Stabilität</label>
        <div class="dmg-effekt-row">
          <span class="dmg-stab-prefix">🛡</span>
          <input
            class="dmg-effekt-input dmg-stab-input"
            type="number"
            min="0"
            [(ngModel)]="stabilitaet"
          />
        </div>
      </div>
    </div>

    <!-- Severity selector -->
    <div class="dmg-field">
      <label class="dmg-label">Schwere des Treffers</label>
      <div class="dmg-severity-grid">
        <button
          *ngFor="let s of severityOptions; trackBy: trackBySeverity"
          class="dmg-severity-btn"
          [class.selected]="s === selectedSeverity"
          [style.--sev-color]="s.color"
          (click)="selectSeverity(s)"
        >
          <span class="dmg-sev-icon">{{ s.icon }}</span>
          <span class="dmg-sev-label">{{ s.label }}</span>
          <span class="dmg-sev-multi">×{{ s.multiplier }}</span>
        </button>
      </div>
    </div>

    <!-- Roll button -->
    <button
      class="dmg-roll-btn"
      [class.rolling]="isRolling"
      [disabled]="isRolling || effektivitaet < 2 || effektivitaet > 100"
      (click)="rollDamage()"
    >
      <span class="dmg-roll-icon">⚔</span>
      Schaden würfeln
    </button>

    <!-- Result display -->
    <div *ngIf="lastResult" class="dmg-result-panel">
      <div class="dmg-result-header">
        <span class="dmg-result-severity" [style.color]="lastResult.severity.color">
          {{ lastResult.severity.icon }} {{ lastResult.severity.label }}
        </span>
        <span class="dmg-result-formula">{{ lastResult.formula }}</span>
      </div>

      <div class="dmg-dice-list">
        <span
          *ngFor="let r of lastResult.individualRolls; let i = index"
          class="dmg-die-chip"
          [class.max-roll]="r === lastResult.effektivitaet"
          [class.min-roll]="r === 1"
        >
          {{ r }}
        </span>
      </div>

      <div class="dmg-total-row">
        <span class="dmg-total-label">Gesamtschaden</span>
        <span class="dmg-total-value" [style.color]="lastResult.severity.color">{{ lastResult.total }}</span>
      </div>

      <div *ngIf="stabilitaet > 0" class="dmg-final-row">
        <span class="dmg-final-label">Nach Stabilität ({{ stabilitaet }})</span>
        <span class="dmg-final-value" [style.color]="lastResult.severity.color">{{ finalDamage }}</span>
      </div>
    </div>
  </div>
</div>
